<div class="overlay">
  <div class="modal">
    <div class="header">
      <h2>Edit Item</h2>
      <div class="close-btn" (click)="cancel()"></div>
    </div>

    <div class="content">
      <div class="image-section">
        <div class="image-preview" [style.backgroundImage]="editableItem.image ? 'url(' + editableItem.image + ')' : ''"></div>
      </div>

      <div class="form-section">

        <div class="field">
          <label>Item name *</label>
          <input [(ngModel)]="editableItem.name">
        </div>

        <div class="field">
          <label>Description *</label>
          <textarea [(ngModel)]="editableItem.description"></textarea>
        </div>

        <div class="status-group">

          <label class="radio available">
            <input type="radio" [(ngModel)]="editableItem.status" value="available">
            <span class="circle"></span>
            <span>Available</span>
          </label>

          <label class="radio borrowed">
            <input type="radio" [(ngModel)]="editableItem.status" value="borrowed">
            <span class="circle"></span>
            <span>Borrowed</span>
          </label>

          <label class="radio returned">
            <input type="radio" [(ngModel)]="editableItem.status" value="returned">
            <span class="circle"></span>
            <span>Returned</span>
          </label>

        </div>

        <div class="actions">
          <button type="button" class="save-btn" (click)="saveFromClick($event)">Save</button>
        </div>
      </div>
    </div>
  </div>
</div>
