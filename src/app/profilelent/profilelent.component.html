<div class="dashboard">

  <div class="sidebar">

    <div class="logo"></div>

    <div class="menu">
      <div class="menu-item" routerLink="/dashboard">
        <div class="icon home"></div>
        <span>Home</span>
      </div>

      <div class="menu-item" routerLink="/history">
        <div class="icon history"></div>
        <span>History</span>
      </div>

      <div class="menu-item active" routerLink="/profile">
        <div class="icon profile"></div>
        <span>Profile</span>
      </div>
    </div>

    <div class="logout" (click)="toggleLogout()">
      <div class="icon logout-icon"></div>
      <span>Logout</span>
    </div>

  </div>

  <div class="main-profile">

    <!-- HEADER -->
    <div class="profile-header-wrapper">
      <div class="profile-header">

        <div class="profile-picture"></div>

        <div class="profile-info">

          <div class="profile-name">
            {{profile.firstName}} {{profile.lastName}}
            <button class="edit-icon" (click)="openEditProfile()"></button>
          </div>

          <div class="profile-details">
            {{profile.contact}}<br>
            {{profile.department}} - {{profile.year}}<br>
            {{profile.email}}
          </div>

        </div>

      </div>
    </div>

    <!-- LIST -->
    <div class="list-wrapper">

      <div class="tabs">
        <div class="tab" routerLink="/profile">Borrowed</div>
        <div class="tab active">Lent</div>
      </div>

      <div class="borrowed-section">

        <div class="borrowed-container">

          <div class="borrowed-list">

            <div class="borrowed-card" *ngFor="let item of lent; let i = index">

              <div class="borrowed-image"></div>

              <div class="borrowed-name">
                {{item.name}}
              </div>

              <!-- RIGHT SIDE -->
              <div class="lent-actions">

                <!-- AVAILABLE -->
                <div *ngIf="item.status === 'available'" class="available-group">
                  <span class="edit-text" (click)="openEdit(item, i)">edit</span>
                  <div class="status available">Available</div>
                </div>

                <!-- BORROWED -->
                <div *ngIf="item.status === 'borrowed'" class="available-group">
                  <span class="edit-text" (click)="openEdit(item, i)">edit</span>
                  <div class="status borrowed">Borrowed</div>
                </div>

                <!-- RETURNED -->
                <div *ngIf="item.status === 'returned'" class="returned-text">
                  returned
                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<app-logout
  *ngIf="showLogoutPopup"
  (cancel)="handleCancel()">
</app-logout>

<!-- 🔥 PROFILE EDIT -->
<app-profileedit
  *ngIf="showEditProfile"
  [profile]="profile"
  (saveProfile)="updateProfile($event)"
  (close)="closeEditProfile()">
</app-profileedit>

<!-- 🔥 EDIT ITEM MODAL -->
<app-edititem
  *ngIf="showEditPopup"
  [item]="selectedItem"
  (close)="handleEditSave($event)">
</app-edititem>
