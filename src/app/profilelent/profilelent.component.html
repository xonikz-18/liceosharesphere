<div class="dashboard">

  <div class="sidebar">

    <div class="logo"></div>

    <div class="menu">
      <div class="menu-item" routerLink="/dashboard">
        <div class="icon home"></div>
        <span>Home</span>
      </div>

      <div class="menu-item" routerLink="/history">
        <div class="icon history"></div>
        <span>History</span>
      </div>

      <div class="menu-item active" routerLink="/profile">
        <div class="icon profile"></div>
        <span>Profile</span>
      </div>
    </div>

    <div class="logout" (click)="toggleLogout()">
      <div class="icon logout-icon"></div>
      <span>Logout</span>
    </div>

  </div>

  <div class="main-profile">

    <!-- HEADER -->
    <div class="profile-header-wrapper">
      <div class="profile-header">

        <div class="profile-picture" [style.backgroundImage]="(profile.profilePicture || profile.profile_picture) ? 'url(' + (profile.profilePicture || profile.profile_picture) + ')' : 'url(assets/images/dummypic.png)'" [style.backgroundSize]="'cover'" [style.backgroundPosition]="'center'"></div>

        <div class="profile-info">

          <div class="profile-name">
            {{profile.fullname || (profile.firstName + ' ' + profile.lastName)}}
            <button class="edit-icon" (click)="openEditProfile()"></button>
          </div>

          <div class="profile-details">
            {{profile.contact_number || profile.contact}}<br>
            {{profile.department}} - {{profile.sex}}<br>
            {{profile.email}}
          </div>

        </div>

      </div>
    </div>

    <!-- LIST -->
    <div class="list-wrapper">

      <div class="tabs">
        <div class="tab" routerLink="/profile">Borrowed</div>
        <div class="tab active">Lent</div>
      </div>

      <div class="borrowed-section">

        <div *ngIf="errorMessage" class="list-message">{{ errorMessage }}</div>

        <div *ngIf="!errorMessage && !lent.length" class="list-message">
          No posted items yet.
        </div>

        <div class="borrowed-container">

          <div class="borrowed-list">

            <div class="borrowed-card" *ngFor="let item of lent">

              <div
                class="borrowed-image"
                [style.backgroundImage]="item.image ? 'url(' + item.image + ')' : 'none'"
                [style.backgroundColor]="item.image ? 'transparent' : '#d9d9d9'">
              </div>

              <div class="borrowed-name">
                {{item.name}}
              </div>

              <!-- RIGHT SIDE -->
              <div class="lent-actions">
                <div class="available-group">
                  <button type="button" class="action-button edit-text" (click)="openEdit(item, $event)">edit</button>
                  <button type="button" class="action-button delete-text" [disabled]="deletingPostId === item.id" (click)="deleteItem(item, $event)">
                    {{ deletingPostId === item.id ? 'deleting...' : 'delete' }}
                  </button>
                  <div class="status" [class.available]="item.status === 'available'" [class.pending]="item.status === 'pending'" [class.borrowed]="item.status === 'borrowed'" [class.returned]="item.status === 'returned'">
                    {{ item.status }}
                  </div>
                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>

<app-logout
  *ngIf="showLogoutPopup"
  (cancel)="handleCancel()">
</app-logout>

<!-- 🔥 PROFILE EDIT -->
<app-profileedit
  *ngIf="showEditProfile"
  [profile]="profile"
  (profilePreviewChange)="handleProfilePreview($event)"
  (saveProfile)="updateProfile($event)"
  (close)="closeEditProfile()">
</app-profileedit>

<app-edititem
  *ngIf="showEditPopup && selectedItem"
  [item]="selectedItem"
  (saveItem)="saveEditedItem($event)"
  (close)="closeEditItem()">
</app-edititem>
