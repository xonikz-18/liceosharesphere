<div class="add-overlay">

  <div class="add-modal">

    <div class="cancel-icon" (click)="onCancel()"></div>

    <!-- ITEM NAME -->
    <div class="form-group">
      <label>Item name <span class="required">*</span></label>

      <input
        type="text"
        class="input-field"
        maxlength="100"
        [(ngModel)]="itemName"
      >

      <div class="char-counter">{{ itemName.length }}/100</div>
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group">
      <label>Description <span class="required">*</span></label>

      <textarea
        class="textarea-field"
        maxlength="600"
        [(ngModel)]="description"
      ></textarea>

      <div class="char-counter">{{ description.length }}/600</div>
    </div>

    <!-- ATTACHMENT -->
    <div class="form-group">
      <label>Attachment <span class="required">*</span></label>

      <!-- hidden input -->
      <input
        type="file"
        #fileInput
        hidden
        (change)="onFileSelected($event)"
      >

      <!-- upload -->
      <label
        class="upload-box"
        *ngIf="!previewImage"
        (click)="fileInput.click()"
      >
        <div class="upload-content">
          <div class="attach-icon"></div>
          <p>Click here to attach image</p>
        </div>
      </label>

      <!-- preview -->
      <div class="upload-box" *ngIf="previewImage">

  <img
    [src]="previewImage"
    style="width:100%; height:100%; object-fit:cover; border-radius:8px;"
    (click)="openPreview(); $event.stopPropagation();"
  >

  <!-- 🔥 CANCEL ICON -->
  <div
    class="remove-image"
    (click)="removeImage(); $event.stopPropagation();"
  ></div>

</div>

    <!-- POST -->
    <div class="button-row">
      <button class="btn-post" (click)="onPost()">Post</button>
    </div>

  </div>

</div>

<!-- FULL VIEW -->
<div
  class="overlay"
  *ngIf="showFullPreview"
  (click)="closePreview()"
>
  <img
    [src]="previewImage"
    style="max-width:90%; max-height:90%; border-radius:10px;"
  >
</div>
