<div class="container">

    <div class="left-panel"></div>

    <div class="right-panel">

        <div class="form-container">
            
            <h1>Account Information</h1>

            <form #signupForm="ngForm" (ngSubmit)="onRegister(signupForm)">

                <label>Full Name <span class="required">*</span></label>
                <input type="text" name="fullname" [(ngModel)]="fullname" #fullnameCtrl="ngModel" required [ngClass]="{ 'invalid': submitted && fullnameCtrl.invalid }" placeholder="Enter Full Name">

                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" [(ngModel)]="email" #emailCtrl="ngModel" required [ngClass]="{ 'invalid': submitted && emailCtrl.invalid }" placeholder="Enter Email">

                <label>Sex <span class="required">*</span></label>
                <select name="sex" [(ngModel)]="sex" #sexCtrl="ngModel" required [ngClass]="{ 'invalid': submitted && sexCtrl.invalid }">
                    <option value="" disabled hidden>Select Sex</option>
                    <option>Female</option>
                    <option>Male</option>
                </select>

                <label>Department <span class="required">*</span></label>
                <select name="department" [(ngModel)]="department" #departmentCtrl="ngModel" required [ngClass]="{ 'invalid': submitted && departmentCtrl.invalid }">
                    <option value="" disabled hidden>Select Department</option>
                    <option>College of Arts and Sciences</option>
                    <option>School of Business, Management and Accountancy</option>
                    <option>College of Criminal Justice</option>
                    <option>College of Engineering</option>
                    <option>College of Information Technology</option>
                    <option>College of Medical Laboratory Science</option>
                    <option>Conservatory of Music, Theater and Dance</option>
                    <option>College of Nursing</option>
                    <option>College of Dentistry</option>
                    <option>College of Pharmacy</option>
                    <option>College of Rehabilitation Sciences</option>
                    <option>College of Radiologic Technology</option>
                    <option>School of Teacher Education</option>
                </select>

                <label>Contact Number <span class="required">*</span></label>
                <input type="text" name="contact" [(ngModel)]="contactNumber" #contactCtrl="ngModel" required [ngClass]="{ 'invalid': submitted && contactCtrl.invalid }" placeholder="Enter Contact Number">

                <label>Password <span class="required">*</span></label>
                <input type="password" name="password" [(ngModel)]="password" #passwordCtrl="ngModel" required [ngClass]="{ 'invalid': submitted && passwordCtrl.invalid }" placeholder="Enter Password">

                <label>Confirm Password <span class="required">*</span></label>
                <input type="password" name="confirmPassword" [(ngModel)]="confirmPassword" #confirmPasswordCtrl="ngModel" required [ngClass]="{ 'invalid': submitted && confirmPasswordCtrl.invalid }" placeholder="Confirm Password">

                <p class="form-error" *ngIf="errorMessage">{{ errorMessage }}</p>

                <div class="buttons">
                    <button class="signup" type="submit">Sign Up</button>
                    <button class="cancel" type="button" (click)="onCancel()">Cancel</button>
                </div>

            </form>

        </div>

    </div>

</div>
