<div class="overlay">
  <div class="modal">

    <div class="header">
      <h2>Edit Profile Information</h2>
      <div class="close-btn" (click)="cancel()"></div>
    </div>

    <div class="content">
      <!-- Profile Picture -->
      <div class="image-section">
        <div 
          class="profile-picture"
          [style.backgroundImage]="'url(' + previewImage + ')'"
        ></div>

        <label class="upload-btn" for="profilePic">
          <input type="file" id="profilePic" name="profilePic" accept="image/*" (change)="onFileSelected($event)">
          <span class="upload-icon"></span>
          Add Profile
        </label>
      </div>

      <!-- Form Fields -->
      <div class="form-section">

        <div class="row">
          <div class="field" style="width:100%;">
            <label for="fullname">Full Name</label>
            <input id="fullname" name="fullname" [(ngModel)]="editableProfile.fullname" required>
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="sex">Sex</label>
            <input id="sex" name="sex" [(ngModel)]="editableProfile.sex" required>
          </div>

          <div class="field">
            <label for="contact_number">Contact Number</label>
            <input id="contact_number" name="contact_number" [(ngModel)]="editableProfile.contact_number">
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label for="department">Department</label>
            <input id="department" name="department" [(ngModel)]="editableProfile.department">
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" [(ngModel)]="editableProfile.email" required>
          </div>
        </div>

        <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

        <div class="actions">
          <button type="button" class="save-btn" (click)="onSaveClick($event)">Save</button>
     
        </div>

      </div>
    </div>
  </div>
</div>
