<div class="overlay">

  <div class="modal">

    <div class="header">
      <h2>Edit Profile Information</h2>
      <div class="close-btn" (click)="cancel()"></div>
    </div>

    <div class="content">

      <div class="image-section">
        <div 
          class="profile-picture"
          [style.backgroundImage]="'url(' + previewImage + ')'"
        ></div>

        <label class="upload-btn">
          <input type="file" (change)="onFileSelected($event)">
          <span class="upload-icon"></span>
          Add Profile
        </label>
      </div>

      <div class="form-section">

        <div class="row">
          <div class="field">
            <label>First Name</label>
            <input [(ngModel)]="editableProfile.firstName">
          </div>

          <div class="field">
            <label>Last Name</label>
            <input [(ngModel)]="editableProfile.lastName">
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Year Level</label>
            <input [(ngModel)]="editableProfile.year">
          </div>

          <div class="field">
            <label>Contact Number</label>
            <input [(ngModel)]="editableProfile.contact">
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Department</label>
            <input [(ngModel)]="editableProfile.department">
          </div>

          <div class="field">
            <label>Email</label>
            <input [(ngModel)]="editableProfile.email">
          </div>
        </div>

        <div class="actions">
          <button class="cancel-btn" (click)="cancel()">Cancel</button>
          <button class="save-btn" (click)="save()">Save</button>
        </div>

      </div>

    </div>

  </div>

</div>
