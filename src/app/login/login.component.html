<div class="login-container">

  <div class="login-card">

    <div class="left">

      <h1 class="title">LICEO</h1>
      <h2 class="subtitle">SHARESPHERE</h2>

      <p class="description">
        Sign in to share, borrow, and track academic resources
        within Liceo de Cagayan University!
      </p>

      <form>

        <label>Email</label>
        <input type="email" placeholder="student@liceo.edu.ph">

        <label>Password</label>
        <input type="password" placeholder="Enter password">

        <button class="login-btn">Login</button>

      </form>

      <a class="forgot">Forgot your password?</a>

      <div class="divider">
        <span></span>
        <p>or create an account</p>
        <span></span>
      </div>

      <button class="signup-btn">Sign up</button>

    </div>

    <div class="right">
      <img src="assets/logo.png" alt="Liceo Logo">
    </div>

  </div>

</div>
