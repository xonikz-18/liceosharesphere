<div class="login-container">
  <div class="center-wrapper">
    <div class="login-left">
      <div class="left-content">
        <div class="logo"></div>

        <p class="subtitle">
          Sign in to share, borrow, and track academic resources
          within Liceo de Cagayan University!
        </p>

        <form (ngSubmit)="login()">
          <label>Email</label>
          <div class="input-group"
               [ngClass]="{'error': invalidLogin || (showError && !email.trim())}">
            <div class="icon email"></div>
            <input
              type="email"
              name="email"
              [(ngModel)]="email"
              (ngModelChange)="clearLoginError()"
              placeholder="student@liceo.edu.ph"
              required
            />
          </div>

          <label>Password</label>
          <div class="input-group"
               [ngClass]="{'error': invalidLogin || (showError && !password.trim())}">
            <div class="icon password"></div>
            <input
              type="password"
              name="password"
              [(ngModel)]="password"
              (ngModelChange)="clearLoginError()"
              placeholder="Enter password"
              required
            />
          </div>

          <button class="login-btn" type="submit" [disabled]="isLoading">
            {{ isLoading ? 'Logging in...' : 'Login' }}
          </button>

          <p *ngIf="errorMessage" class="error">{{ errorMessage }}</p>
        </form>

        <p class="forgot" routerLink="/forgotpassemail">
          Forgot your password?
        </p>

        <div class="divider">
          <span>or create an account</span>
        </div>

        <button routerLink="/signinuser" class="signup-btn">
          Sign up
        </button>

      </div>
    </div>

    <div class="login-right">
      <div class="diamond"></div>
    </div>

  </div>
</div>
