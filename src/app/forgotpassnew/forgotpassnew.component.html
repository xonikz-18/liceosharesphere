<div class="container">

  <!-- BACK BUTTON -->
  <div class="back-btn" (click)="goBack()"></div>

  <!-- CARD -->
  <div class="card">

    <h2>Create a new password</h2>
    <p class="subtitle">Make sure your password is strong and secure</p>

    <!-- PASSWORD -->
    <input
      type="password"
      placeholder="Enter new password"
      [(ngModel)]="password"
      class="input-field"
    >

    <!-- CONFIRM PASSWORD -->
    <input
      type="password"
      placeholder="Re-enter new password"
      [(ngModel)]="confirmPassword"
      class="input-field"
    >

    <!-- ERROR MESSAGE -->
    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <!-- BUTTON -->
    <button class="btn" (click)="resetPassword()">Confirm</button>

  </div>

</div>
