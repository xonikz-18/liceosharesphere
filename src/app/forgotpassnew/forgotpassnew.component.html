<div class="container">
  <div class="back-btn" (click)="goBack()"></div>
  <div class="card">
    <h2>Create a new password</h2>
    <p class="subtitle">Make sure your password is strong and secure</p>
    <input type="password"placeholder="Enter new password" [(ngModel)]="password" class="input-field">
    <input type="password" placeholder="Re-enter new password" [(ngModel)]="confirmPassword" class="input-field">
    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>
    <button class="btn" (click)="resetPassword()">Confirm</button>
  </div>
</div>
