<div class="overlay" (click)="onClose()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="header">
      <h2>{{ item?.name }}</h2>
      <div class="close-btn" (click)="onClose()"></div>
    </div>
    <div class="content">
      <div class="image-section">
        <div 
          class="image-preview"
          [ngStyle]="{'background-image': 'url(' + item?.image + ')'}"
          (click)="openPreview()">
        </div>
      </div>
      <div class="form-section">
        <div class="owner">
          <div class="avatar" [style.backgroundImage]="item?.ownerProfilePicture ? 'url(' + item?.ownerProfilePicture + ')' : 'url(assets/images/dummypic.png)'" [style.backgroundSize]="'cover'" [style.backgroundPosition]="'center'"></div>
          <span>{{ item?.owner }}</span>
          <span class="status-badge" [ngClass]="displayedStatus">
            {{ displayedStatus }}
          </span>
        </div>

        <div class="field">
          <label><b>Description</b></label>
          <p class="desc">{{ item?.description }}</p>
        </div>

        <div class="actions">
          <button *ngIf="!isOwner" class="msg-btn" (click)="messageOwner($event)">Message Owner</button>
          <button class="borrow-btn" [class.pending]="displayedStatus === 'pending'" [disabled]="isRequestDisabled || isSubmittingRequest" (click)="requestBorrow($event)">
            {{ requestButtonLabel }}
          </button>
        </div>

        <p *ngIf="requestMessage" class="request-message">{{ requestMessage }}</p>

      </div>
    </div>
  </div>
</div>

<div 
  class="fullscreen" 
  *ngIf="showPreview" 
  (click)="closePreview()"
>
  <img [src]="item?.image">
</div>
