<div class="verify-container">

  <!-- Back button top-left -->
  <div class="back-btn" (click)="back()"></div>

  <!-- Centered content -->
  <div class="content">
    <h1>Get Started by Creating Your Account</h1>
    <p>Please register using your official Liceo email address.</p>

    <div class="input-group">
      <input
        type="email"
        placeholder="Enter your email"
        [(ngModel)]="email"
      />
      <button (click)="continue()">Continue</button>
    </div>

  </div>

</div>
