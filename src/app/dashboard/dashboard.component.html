<div class="dashboard">
  <div class="sidebar">
    <div class="logo"></div>
    <div class="menu">
      <div class="menu-item" routerLink="/dashboard" routerLinkActive="active">
        <div class="icon home"></div>
        <span>Home</span>
      </div>

      <div class="menu-item" routerLink="/history" routerLinkActive="active">
        <div class="icon history"></div>
        <span>History</span>
      </div>

      <div class="menu-item" routerLink="/profile">
        <div class="icon profile"></div>
        <span>Profile</span>
      </div>

    </div>

    <div class="logout" (click)="toggleLogout()">
      <div class="icon logout-icon"></div>
      <span>Logout</span>
    </div>

  </div>
  <div class="main">
    <div class="topbar">
      <div class="btn" (click)="openAddPopup()">
        <div class="icon add"></div>
        <span>Add</span>
      </div>

      <div class="top-icons">
        <div class="search-container">
          <div class="icon search"></div>
          <input type="text" placeholder="Search item" [value]="searchTerm" (input)="onSearchChange($event)">
        </div>

        <div class="btn notif-btn" (click)="toggleNotifications($event)">
          <div class="icon notif"></div>
          <span class="notif-badge" *ngIf="notificationCount > 0">{{ notificationCount }}</span>
        </div>

        <div class="btn notif-btn" (click)="openMessages($event)">
          <div class="icon message"></div>
          <span class="notif-badge" *ngIf="messageUnreadCount > 0">{{ messageUnreadCount }}</span>
        </div>
      </div>
    </div>

    <div class="content">
      <div *ngIf="errorMessage" class="empty-state">{{ errorMessage }}</div>

      <div class="item-grid">
        <div class="item-card" *ngFor="let item of filteredItems" (click)="openItem(item)">

          <div class="item-title">{{ item.name }}</div>

          <div
          class="item-image"
          [style.backgroundImage]="'url(' + item.image + ')'">
          </div>

          <div class="item-footer">

            <div class="owner">
              <div class="avatar" [style.backgroundImage]="item.ownerProfilePicture ? 'url(' + item.ownerProfilePicture + ')' : 'url(assets/images/dummypic.png)'" [style.backgroundSize]="'cover'" [style.backgroundPosition]="'center'"></div>
              <span>{{ item.owner }}</span>
            </div>

            <div class="meta">
              <div class="date">{{ item.date }}</div>
              <div class="status-badge" [class.available]="item.status === 'available'" [class.pending]="item.status === 'pending'" [class.borrowed]="item.status === 'borrowed'" [class.returned]="item.status === 'returned'">
                {{ item.status }}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div *ngIf="!errorMessage && !items.length" class="empty-state">
        No posts yet.
      </div>

      <div *ngIf="!errorMessage && !!items.length && !filteredItems.length" class="empty-state">
        No matching items found.
      </div>

    </div>

  </div>

</div>

<app-logout
  *ngIf="showLogoutPopup"
  (cancel)="handleCancel()">
</app-logout>

<app-add
  *ngIf="showAddPopup"
  (cancel)="closeAddPopup()"
  (postItem)="handlePost($event)">
</app-add>

<app-notification
  *ngIf="showNotifications"
  (click)="$event.stopPropagation()">
</app-notification>

<app-message
  *ngIf="showMessages"
  [targetOwner]="messageTargetOwner"
  (closePanel)="closeMessagePanel()"
  (click)="$event.stopPropagation()">
</app-message>

<app-itemview
  *ngIf="selectedItem"
  [item]="selectedItem"
  (close)="closeItem()">
</app-itemview>
