<div class="message-container">

  <div class="message-panel" *ngIf="!openChat">
    <div class="notif-header">
      <div class="message-icon"></div>
      <div class="title">Messages</div>
      <button type="button" class="close-btn" (click)="close()">x</button>
    </div>

    <div class="conversation-list" *ngIf="conversations.length > 0; else emptyConversations">
      <button
        class="conversation-item"
        type="button"
        *ngFor="let conversation of conversations"
        (click)="openConversation(conversation)">
        <div class="avatar" [style.backgroundImage]="conversation.otherProfilePicture ? 'url(' + conversation.otherProfilePicture + ')' : 'url(assets/images/dummypic.png)'"></div>
        <div class="conversation-info">
          <div class="name">{{ conversation.otherName }}</div>
          <div class="preview">{{ conversation.lastMessage || 'Start a conversation' }}</div>
        </div>
        <div class="conversation-meta">
          <div class="time">{{ formatTime(conversation.lastMessageAt) }}</div>
          <span class="unread-dot" *ngIf="conversation.unreadCount > 0"></span>
        </div>
      </button>
    </div>

    <ng-template #emptyConversations>
      <div class="empty-state">No messages yet.</div>
    </ng-template>
  </div>

  <div class="chat-panel" *ngIf="openChat">
    <div class="notif-header chat-header">
      <button type="button" class="back-btn" (click)="goToInbox()"></button>
      <div class="avatar" [style.backgroundImage]="selectedConversation?.otherProfilePicture ? 'url(' + selectedConversation?.otherProfilePicture + ')' : 'url(assets/images/dummypic.png)'"></div>
      <div class="name">{{ selectedConversation?.otherName }}</div>
      <button type="button" class="close-btn" (click)="close()">x</button>
    </div>

    <div #chatBody class="chat-body">
      <div class="message-row" *ngFor="let msg of messages" [class.right]="isMine(msg)" [class.left]="!isMine(msg)">
        <div class="avatar-sm" *ngIf="!isMine(msg)"
          [style.backgroundImage]="msg.senderProfilePicture ? 'url(' + msg.senderProfilePicture + ')' : ''"></div>
        <div class="bubble">{{ msg.messageText }}</div>
        <div class="avatar-sm" *ngIf="isMine(msg)"
          [style.backgroundImage]="currentUserProfilePicture ? 'url(' + currentUserProfilePicture + ')' : ''"></div>
      </div>
      <div class="empty-thread" *ngIf="messages.length === 0">Start your conversation here.</div>
    </div>

    <div class="chat-input">
      <input
        type="text"
        placeholder="send a message"
        [(ngModel)]="messageText"
        (keyup.enter)="sendMessage()">
      <button type="button" class="send-btn" (click)="sendMessage()">&#10148;</button>
    </div>
    <div class="send-error" *ngIf="sendError">{{ sendError }}</div>
  </div>

</div>
