<div class="container">

  <!-- BACK BUTTON -->
  <div class="back-btn" (click)="goBack()"></div>

  <!-- CARD -->
  <div class="card">

    <h2>Find your account</h2>
    <p class="subtitle">Enter your Liceo email</p>

    <!-- INPUT -->
    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email"
      class="input-field"
    >

    <!-- BUTTON -->
    <button class="btn" (click)="continue()">Continue</button>

  </div>

</div>
