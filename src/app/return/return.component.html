<div class="overlay">
  <div class="modal">
    <div class="header">
      <h2>{{item.name}}</h2>
      <div class="close-btn" (click)="close.emit()"></div>
    </div>

    <div class="content">
      <div class="image-section">
        <div class="image-preview"></div>
      </div>
      <div class="form-section">
        <div class="field owner">
          <div class="avatar"></div>
          <span>Kissie Ann</span>
        </div>

        <div class="field">
          <div class="desc"><label><h2><b>Description</b></h2></label></div>
          <div class="description-text">
            Official Liceo PE uniform in good condition. Lightly used, clean,
            and ready for use in PE classes and university-approved activities.
            <br><br>
            Please return the uniform clean and properly folded.
          </div>
        </div>
        <div class="actions">
          <button class="return-btn">Return to Owner</button>
        </div>
      </div>
    </div>
  </div>
</div>
